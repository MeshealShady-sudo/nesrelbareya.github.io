<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اطلب دلوقتي | نسر البرية للأكل الجاهز</title>
<meta name="description" content="اطلب من نسر البرية على واتساب، فيسبوك، أو من خلال الفورم.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="siteHeader"></div>

<!-- ===== PAGE HERO ===== -->
<section class="page-hero">
  <div class="wrap">
    <div class="section-eyebrow">اطلب دلوقتي</div>
    <h1>جاهز تطلب؟ اختار الطريقة الأسهل ليك</h1>
    <p>واتساب، جروب الفيسبوك، أو الفورم — كله بيوصلنا في ثواني.</p>
  </div>
</section>

<!-- ===== ORDER / CONTACT ===== -->
<section class="order section">
  <div class="wrap">
    <div class="order-content reveal">
      <div class="order-actions">
        <a href="https://www.facebook.com/groups/558806414271710/" target="_blank" rel="noopener" class="order-link">
          <div class="ic"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M22 12a10 10 0 1 0-11.6 9.9v-7H7.9V12h2.5V9.8c0-2.5 1.5-3.9 3.8-3.9 1.1 0 2.2.2 2.2.2v2.4h-1.3c-1.2 0-1.6.8-1.6 1.6V12h2.8l-.4 2.9h-2.4v7A10 10 0 0 0 22 12Z"/></svg></div>
          <div><b>جروب الفيسبوك بتاعنا</b><span>أكتر من 6 آلاف عضو، تابع آخر الأصناف</span></div>
        </a>
        <a href="tel:+201090213723" class="order-link">
          <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3-8.7A2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1 1 .4 2 .7 2.9a2 2 0 0 1-.5 2.1L8 9.9a16 16 0 0 0 6 6l1.2-1.3a2 2 0 0 1 2.1-.5c.9.3 1.9.6 2.9.7a2 2 0 0 1 1.8 2.1Z"/></svg></div>
          <div><b>اتصل بينا مباشرة</b><span>01090213723</span></div>
        </a>
      </div>
    </div>

    <div class="order-card reveal">
      <h3>اطلب أونلاين</h3>
      <p>املا بياناتك وهنتواصل معاك لتأكيد الطلب</p>
      <form id="orderForm">
        <div class="field">
          <label>الاسم</label>
          <input name="fullName" type="text" placeholder="اكتب اسمك" required
            pattern="^[A-Za-z\u0621-\u064A\u0660-\u0669 ]+$"
            title="اكتب حروف فقط بالعربي أو بالإنجليزي">
        </div>
        <div class="field">
          <label>رقم التليفون</label>
          <input name="phone" type="tel" placeholder="01xxxxxxxxx" required
            pattern="^[0-9]+$" inputmode="numeric"
            title="اكتب أرقام فقط">
        </div>
        <div class="field">
          <label>العنوان</label>
          <input name="address" type="text" placeholder="الحي / الشارع" required>
        </div>
        <div class="field">
          <label>الطلب</label>
          <input name="order" type="text" placeholder="مثال: دجاج مشوي + كول سلو">
        </div>
        <div class="field">
          <label>ملاحظات على الطلب</label>
          <textarea name="notes" placeholder="مثال: عايز دجاجة مشوية وكول سلو"></textarea>
        </div>
        <button type="submit" class="submit-btn">أرسل الطلب</button>
      </form>
    </div>
  </div>
</section>

<div id="siteFooter"></div>

<script src="assets.js"></script>
<script src="layout.js"></script>
<script>NESR_renderLayout('order');</script>
<script src="script.js"></script>
</body>
</html>
